syntax = "proto3";

package termyte.kernel;

service KernelService {
    // 1. Lifecycle & Planning
    rpc EvaluatePlan(PlanRequest) returns (PlanContract);
    rpc RecordOutcome(OutcomeRequest) returns (OutcomeResponse);
    
    // 2. Governance
    rpc PrepareToolCall(ToolCallRequest) returns (ToolCallVerdict);
    rpc CommitToolCall(ToolOutcomeRequest) returns (CommitAck);
    
    rpc GetCausalTrace(TraceRequest) returns (TraceResponse);
    
    // 3. Heartbeat
    rpc SemanticHeartbeat(stream HeartbeatSignal) returns (stream KernelSignal);
}

message PlanRequest {
    string agent_id = 1;
    string project_id = 2;
    string plan_text = 3;
    repeated string intent_tags = 4;
}

message PlanContract {
    string contract_hash = 1;
    float risk_score = 2;
    repeated Invariant required_invariants = 3;
    repeated Watchpoint watchpoints = 4;
}

message Invariant {
    string name = 1;
    string condition = 2;
}

message Watchpoint {
    string trigger = 1;
    string action = 2;
}

message OutcomeRequest {
    string plan_hash = 1;
    string success_criteria = 2;
    bool success = 3;
    string details = 4;
}

message OutcomeResponse {
    bool recorded = 1;
}

message ToolCallRequest {
    string tool_name = 1;
    string arguments_json = 2;
}

message ToolCallVerdict {
    enum Action {
        ALLOW = 0;
        SOFT_BLOCK = 1;
        HARD_BLOCK = 2;
        AUDIT_REQUIRED = 3;
    }
    Action action = 1;
    string reason = 2;
}

message ToolOutcomeRequest {
    string tool_call_id = 1;
    string outcome_json = 2;
}

message CommitAck {
    bool committed = 1;
}

message TraceRequest {
    string plan_hash = 1;
}

message TraceResponse {
    repeated CausalEvent events = 1;
}

message CausalEvent {
    uint64 timestamp = 1;
    string event_type = 2;
    string payload = 3;
}

message HeartbeatSignal {
    string agent_id = 1;
    string status = 2;
}

message KernelSignal {
    string instruction = 1;
}
